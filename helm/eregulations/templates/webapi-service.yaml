apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-webapi
  labels:
    {{- include "eregulations.labels" . | nindent 4 }}
spec:
  type: {{ .Values.webapi.service.type }}
  ports:
    - port: {{ .Values.webapi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "eregulations.webapi.selectorLabels" . | nindent 4 }}
