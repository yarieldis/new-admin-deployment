apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-spa
  labels:
    {{- include "eregulations.labels" . | nindent 4 }}
    {{- include "eregulations.spa.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.spa.replicaCount }}
  selector:
    matchLabels:
      {{- include "eregulations.spa.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eregulations.spa.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: spa
          image: "{{ .Values.spa.image.repository }}:{{ .Values.spa.image.tag }}"
          imagePullPolicy: {{ .Values.spa.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4200
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.spa.resources | nindent 12 }}
